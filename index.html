<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYT444</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#081b33;
color:white;
}

header{
background:#12385f;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:30px;
font-weight:bold;
color:#FFD700;
}

.btn{
padding:10px 18px;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
margin-left:5px;
}

.login{
background:#16a34a;
}

.register{
background:#2563eb;
}

.menu{
display:flex;
overflow:auto;
padding:10px;
gap:10px;
background:#102a4c;
}

.menu button{
padding:10px 18px;
background:#1d4ed8;
color:white;
border:none;
border-radius:8px;
}

.active{
background:#16a34a !important;
}

.card{
background:#184a78;
margin:15px;
padding:15px;
border-radius:10px;
}

.title{
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.live{
color:#00ff88;
margin-bottom:15px;
}

.odds{
display:flex;
justify-content:space-between;
}

.box{
width:31%;
background:white;
color:black;
padding:12px;
text-align:center;
border-radius:8px;
}

.box h3{
margin-bottom:8px;
}

.box p{
font-size:24px;
font-weight:bold;
color:#0050d8;
}

footer{
padding:20px;
text-align:center;
color:#bbb;
}
</style>

</head>

<body>

<header>

<div class="logo">AYT444</div>

<div>

<button class="btn login">Login</button>

<button class="btn register">Register</button>

</div>

</header>

<div class="menu">

<button class="active">Sports</button>

<button>Live</button>

<button>Upcoming</button>

<button>Results</button>

</div>

<div class="card">

<div class="title">🏏 Bangladesh vs India</div>

<div class="live">LIVE</div>

<div class="odds">

<div class="box">

<h3>Bangladesh</h3>

<p>1.90</p>

</div>

<div class="box">

<h3>Draw</h3>

<p>3.15</p>

</div>

<div class="box">

<h3>India</h3>

<p>2.05</p>

</div>

</div>

</div>

<footer>

© AYT444 Demo UI

</footer>

</body>

  </html>
